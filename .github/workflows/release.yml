name: Release
on:
  push:
    tags: ['v*']
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET"
      - name: Archive Unix
        if: runner.os != 'Windows'
        env:
          BUILD_TARGET: ${{ matrix.target }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tar -czf "agent-ctx-${TAG_NAME}-${BUILD_TARGET}.tar.gz" \
            -C "target/${BUILD_TARGET}/release" agent-ctx
      - name: Archive Windows
        if: runner.os == 'Windows'
        env:
          BUILD_TARGET: ${{ matrix.target }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          Compress-Archive -Path "target/${env:BUILD_TARGET}/release/agent-ctx.exe" -DestinationPath "agent-ctx-${env:TAG_NAME}-${env:BUILD_TARGET}.zip"
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            *.tar.gz
            *.zip
